<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="Swiggy Instamart - India's fastest grocery delivery platform. Fresh products delivered in under 20 minutes." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Swiggy Instamart - Grocery Delivery in 20 Minutes</title>
    
    <!-- SEO Meta Tags -->
    <meta property="og:title" content="Swiggy Instamart - Grocery Delivery in 20 Minutes" />
    <meta property="og:description" content="Order fresh groceries and get them delivered to your doorstep in under 20 minutes. Available 24x7 across India." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://instamart.swiggy.com" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.jpg" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Swiggy Instamart - Grocery Delivery in 20 Minutes" />
    <meta name="twitter:description" content="Order fresh groceries and get them delivered to your doorstep in under 20 minutes." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.jpg" />
    
    <!-- Performance optimizations -->
    <link rel="dns-prefetch" href="//images.unsplash.com">
    <link rel="dns-prefetch" href="//api.instamart.com">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
